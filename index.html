<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Ludo</title>
  <link rel="icon" type="image/ico" href="favicon.ico">
  <style>
    *,*::before,*::after {
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root {
      --background-colour: #fef6b5;
      --background-dark-mode: rgb(20, 20, 20);

      --safe-orange: rgb(253, 235, 200);
      --safe-green: rgb(188, 241, 188);
      --safe-blue: rgb(212, 212, 253);
      --safe-red: rgb(252, 207, 207);
    }

    body {
      background-color: var(--background-colour);
      display:flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
    }

    .ludo {
      width: min(100%, 700px);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .board {
      width: min(100%, 700px);
      aspect-ratio: 1/1;
      border: 10px red solid;
      outline: 2px black solid;
      outline-offset: -16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .play-area {
      width: 95%;
      height: 95%;
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      grid-template-rows: repeat(11, 1fr);
    }

    .info-panel {
      width: 100%;
      flex: 1;
      border: 10px rgb(243, 142, 27) solid;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .square {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle {
      background-color: aliceblue;
      width: 85%;
      aspect-ratio: 1/1;
      border-radius: 50%;
      outline: 1px black solid;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .safe-orange {
      outline: 2px orange solid;
      background-color: var(--safe-orange);
    }      

    .safe-green {
      outline: 2px green solid;
      background-color: var(--safe-green);
    }      

    .safe-blue {
       outline: 2px blue solid;
      background-color: var(--safe-blue);
    }      

    .safe-red {
       outline: 2px red solid;
      background-color: var(--safe-red);
    }
  
    #square34, #square18, #square86, #square102 { 
      font-size: clamp(10px, 4vw, 40px);
      color: rgb(105, 105, 105);
    }

    @media (min-width: 768px) and (max-width: 1024px) { /* tablet resolution */
      .ludo {
        height: 520px;
        flex-direction: row;
      }

      .board {
        height: 500px;
        width: 500px;
      }

      .info-panel {
        width:268px;
        height: 500px;
      }
    }

    @media (min-width: 1025px) { /* desktop resolution */
      .ludo {
        flex-direction: row;
        width: 1020px;
        height: min(700px, 100dvh);
      }

      .info-panel {
        margin-left: 20px;
      }
    }

  </style>
</head>
<body>
  <div class="ludo">
    <div class="board">
      <div class="play-area" id="play-area"></div>
    </div>
    <div class="info-panel"></div>
  </div>

  <script>
    
    function darkMode () {
      let element = document.body;
      element.classList.toggle("dark-mode");
    }

    //draw board

    // assign each square a div to begin with
    for (let i = 0; i < 121; i++) {
      const playArea = document.getElementById("play-area");
      const square = document.createElement("div");

      square.classList.add("square");
      playArea.appendChild(square);
      square.setAttribute("id", `square${i}`);
    }

    const myPath = [114, 103, 92, 81, 70, 69, 68, 67, 66, 55,
                    44, 45, 46, 47, 48, 37, 26, 15, 4, 5,
                    6, 17, 28, 39, 50, 51, 52, 53, 54, 65, 
                    76, 75, 74, 73, 72, 83, 94, 105, 116, 115];

    // blue, orange, green and red
    const homeSquares = [[99, 100, 110, 111], [0, 1, 11, 12], [9, 10, 20, 21], [108, 109, 119, 120]];
    const safeSquares = [[104, 93, 82, 71], [56, 57, 58, 59], [16, 27, 38, 49], [64, 63, 62, 61]];
    const startSquares = [0, 10, 20, 30];
    const myColours = ["safe-blue", "safe-orange", "safe-green", "safe-red",];
    const temp = ["blue", "orange", "green", "red"];
    
    // path 
    let n = 1;
    for (let i = 0; i < myPath.length; i++) {
      const cir2 = document.getElementById(`square${myPath[i]}`);
      const circle = document.createElement("div");
      cir2.appendChild(circle);
      circle.classList.add("circle");
      circle.setAttribute("id", `path${n}`);
      n++;
      for (let j = 0; j < 4; j++) {   // highlight start squares
        if (i === startSquares[j]) {
          circle.classList.add(`${myColours[j]}`);
          }
        }
      }
      
      // home squares
      for (let j = 0; j < 4; j++) {
        for (let i = 0; i < 4; i++) {
          const cir2 = document.getElementById(`square${homeSquares[j][i]}`);
          const circle = document.createElement("div");
          cir2.appendChild(circle);
          circle.classList.add("circle");
          circle.classList.add(`${myColours[j]}`);  // highlight squares with a colour
          circle.setAttribute("id", `home-${temp[j]}-${i+1}`);
        }
      }
      
      // safe squares
      for (let j = 0; j < 4; j++) {
        for (let i = 0; i < 4; i++) {
          const cir2 = document.getElementById(`square${safeSquares[j][i]}`);
          const circle = document.createElement("div");
          cir2.appendChild(circle);
          circle.classList.add("circle");
          circle.classList.add(`${myColours[j]}`);  // highlight squares with a colour
          circle.setAttribute("id", `safe-${temp[j]}-${i+1}`);
        }
      }
      
      // arrows
      document.getElementById("square34").innerHTML = "&#8594";
      document.getElementById("square18").innerHTML = "&#8595";
      document.getElementById("square86").innerHTML = "&#8592";
      document.getElementById("square102").innerHTML = "&#8593";
      /*
      //tokens
      for (let j = 0; j < 4; j++) {
        for (let i = 0; i < 4; i++) {
          const myToken = document.getElementById(`home-${temp[j]}-${i+1}`);
          const token = document.createElement("div");
          myToken.appendChild(token);
          token.classList.add(`token-${temp[j]}`);
          token.setAttribute("id", `token-${temp[j]}-${i+1}`);
        }  
      }
      
    const gameToken = [[], [], [], []];
    */
  </script>

</body>
</html>
